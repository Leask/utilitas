name: Node.js Package

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  release:
    types: [published]

permissions:
  contents: read

jobs:
  test:
    if: github.event_name != 'release'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          registry-url: https://registry.npmjs.org

      - run: npm install --include=dev
      - run: node build.mjs
      - run: npm run pack
      - run: npm test

  publish:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - run: npm install --include=dev
      - run: node build.mjs
      - run: npm run pack
      - run: npm test
      - run: npm publish
